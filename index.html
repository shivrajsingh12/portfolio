              <div class="contact-badge" style="display: flex; align-items: center; gap: 10px;">
                <div style="background-color: #25D366; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></div>
                <span style="font-size: 18px; color: #e0e0e0; font-weight: 500;">${data.phone}</span>
              </div>
            ` : ''}
            ${data.email ? `
  <a href="mailto:${data.email}" style="text-decoration:none;">
    <div class="contact-badge" style="display: flex; align-items: center; gap: 10px;">
      
      <div style="background-color: #EA4335; width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center;">
        ✉️
      </div>

      <span style="font-size: 18px; color: #e0e0e0; font-weight: 600;">
        ${data.email}
      </span>

    </div>
  </a>
` : ''}
          ${data.linkedin ? `
  <a href="${data.linkedin}" target="_blank" style="text-decoration:none;">
    <div class="contact-badge" style="display: flex; align-items: center; gap: 10px;">
      <div style="background-color: #0077b5; width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center;">
        <span style="color:white; font-size:15px; font-weight:bold;">in</span>
      </div>
      <span style="font-size: 18px; color: #e0e0e0; font-weight: 600;">
        ${data.linkedinName}
      </span>
    </div>
  </a>
` : ''}
${data.github ? `
  <a href="${data.github}" target="_blank" style="text-decoration:none;">
    <div class="contact-badge" style="display: flex; align-items: center; gap: 10px;">
      <div style="background-color: #333; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <span style="color:white; font-size:15px;">🐙</span>
      </div>
      <span style="font-size: 18px; color: #e0e0e0; font-weight: 600;">
        ${data.githubName}
      </span>
    </div>
  </a>
` : ''}

${data.leetcode ? `
  <a href="${data.leetcode}" target="_blank" style="text-decoration:none;">
    <div class="contact-badge" style="display: flex; align-items: center; gap: 10px;">
      <div style="background-color: #FFA116; width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center;">
        <span style="color:white; font-size:15px;">💻</span>
      </div>
      <span style="font-size: 18px; color: #e0e0e0; font-weight: 600;">
        ${data.leetcodeName}
      </span>
    </div>
  </a>
` : ''}
          ${data.instagram ? `
  <a href="${data.instagram}" target="_blank" style="text-decoration:none;">
    <div class="contact-badge" style="display: flex; align-items: center; gap: 10px;">
      <div style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
        📸
      </div>
      <span style="font-size: 18px; color: #e0e0e0; font-weight: 600;">
        ${data.instagramName}
      </span>
    </div>
  </a>
` : ''}
          </div>
        </div>
      `;
      
      // make the row flex on desktop
      profileRow.style.display = "flex";
      profileRow.style.flexDirection = window.innerWidth >= 1024 ? "row" : "column";
      profileRow.style.gap = "40px";
      profileRow.style.alignItems = "flex-start";
      window.addEventListener('resize', () => {
        profileRow.style.flexDirection = window.innerWidth >= 1024 ? "row" : "column";
      });
    }
    
    // 2) Render Education + Experience + Tech stack (two column layout)
    const expEduRow = document.getElementById("expEduRow");
    if (expEduRow) {
      // Education HTML (with CGPA & percentages)
      let eduHtml = `<div style="width: 100%; max-width: 420px; flex-shrink: 0;">
        <h3 style="font-family: 'Georgia', serif; font-size: 22px; font-weight: 800; color: #ffffff; text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 3px; margin-bottom: 14px;">Education</h3>`;
      if (data.education && data.education.length) {
        data.education.forEach(edu => {
          eduHtml += `
            <div style="margin-bottom: 20px;">
              ${edu.duration ? `<p style="font-size: 20px; color: #D4A017; margin-bottom: 4px; font-weight: 500;">${edu.duration}</p>` : ''}
              ${edu.institution ? `<p style="font-size: 14px; font-weight: 700; color: #ffffff; line-height: 1.3; margin-bottom: 4px;">${edu.institution}</p>` : ''}
              ${edu.degree ? `<p style="font-size: 10px; color: #aaaaaa; font-style: italic;">${edu.degree}</p>` : ''}
            </div>
          `;
        });
      } else {
        eduHtml += `<p style="font-size: 11px; color: #aaa;">Education details will appear here.</p>`;
      }
      
      // Tech stack (based on resume skills)
      eduHtml += `<h3 style="font-family: 'Georgia', serif; font-size: 22px; font-weight: 800; color: #ffffff; text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 3px; margin: 32px 0 12px 0;">Tech Stack</h3>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">`;
      if (data.software && data.software.length) {
        data.software.forEach(tool => {
          eduHtml += `<span style="border: 1px solid rgba(255,255,255,0.25); border-radius: 999px; padding: 5px 14px; font-size: 13px; color: #e0e0e0; background-color: rgba(255,255,255,0.06); font-weight: 600;">${tool}</span>`;
        });
      } else {
        eduHtml += `<span style="color:#aaa;">Add software/tools in data</span>`;
      }
      eduHtml += `</div>`;
      
      // Personal traits based on summary
      eduHtml += `<p style="font-size: 15px; color: #aaaaaa; margin-top: 28px; margin-bottom: 6px; font-weight: 500;">Personal</p>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">`;
      if (data.personalTraits && data.personalTraits.length) {
        data.personalTraits.forEach(trait => {
          eduHtml += `<span style="border: 1px solid #888888; border-radius: 20px; padding: 3px 12px; font-size: 12px; color: #cccccc; font-style: italic;">${trait}</span>`;
        });
      } else {
        eduHtml += `<span style="color:#aaa;">Add personal traits</span>`;
      }
      eduHtml += `</div></div>`;
      
      // Experience column (Projects from resume)
      let expHtml = `<div style="flex: 1; min-width: 0;">
        <h3 style="font-family: 'Georgia', serif; font-size: 22px; font-weight: 800; color: #ffffff; text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 3px; margin-bottom: 20px;">Featured Projects</h3>`;
      if (data.experiences && data.experiences.length) {
        data.experiences.forEach(exp => {
          // highlight project link if any responsibility includes url
          let respText = exp.responsibilities.join(" • ");
          expHtml += `
            <div style="margin-bottom: 28px;">
              ${exp.duration ? `<p style="font-size: 11px; color: #D4A017; margin-bottom: 4px; font-weight: 500;">${exp.duration}</p>` : ''}
              ${exp.company ? `<p style="font-size: 15px; font-weight: 700; color: #ffffff; line-height: 1.2; margin-bottom: 4px;">${exp.company}</p>` : ''}
              ${exp.role ? `<p style="font-size: 11px; color: #bbbbbb; font-style: italic; margin-bottom: 6px;">${exp.role}</p>` : ''}
              <p style="font-size: 16px; color: #cccccc; line-height: 1.5;">${respText}</p>
              <a href="${exp.link}" target="_blank" style="color: #F44336; text-decoration: underline;">View Project</a>

            </div>
          `;
        });
      } else {
        expHtml += `<p style="font-size: 12px; color: #aaa;">Project showcase will appear here.</p>`;
      }
      expHtml += `</div>`;
      
      expEduRow.innerHTML = `<div style="display: flex; flex-direction: column; gap: 48px; width: 100%;">${eduHtml}${expHtml}</div>`;
      const innerContainer = expEduRow.firstChild;
      if (innerContainer) {
        innerContainer.style.display = "flex";
        innerContainer.style.flexDirection = window.innerWidth >= 1024 ? "row" : "column";
        innerContainer.style.gap = "48px";
        window.addEventListener('resize', () => {
          if (innerContainer) innerContainer.style.flexDirection = window.innerWidth >= 1024 ? "row" : "column";
        });
      }
    }
    
    // Optional: small GSAP fade animation (lightweight)
    gsap.fromTo(".main-portfolio", { opacity: 0 }, { opacity: 1, duration: 0.9, ease: "power2.out" });
    gsap.fromTo("#profileRow > div", { y: 20, opacity: 0 }, { y: 0, opacity: 1, stagger: 0.1, duration: 0.6, delay: 0.2 });
    gsap.fromTo("#expEduRow", { y: 25, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, delay: 0.4 });
  }
  
  // Run after page load
  window.addEventListener("DOMContentLoaded", () => {
    renderPortfolio();
  });
</script>
</body>
</html>
